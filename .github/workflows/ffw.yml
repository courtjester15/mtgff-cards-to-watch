name: FFW automated archive

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/ffw.yml"
      - "archive/**"
      - "web/**"
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Processing mode
        required: true
        type: choice
        options: [next, backfill, retry_failed, deploy_only]
        default: next
      batch_size:
        description: Eligible episodes to process (1-20)
        required: true
        default: "1"
      force_guid:
        description: Optional exact episode GUID to force
        required: false
        default: ""
      deploy:
        description: Deploy GitHub Pages after validation
        required: true
        type: boolean
        default: true

concurrency:
  group: ffw-production-writer
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FFW_MODE: live
  FFW_AI_PROVIDER: gemini
  FFW_TRANSCRIPTION_MODEL: gemini-flash-latest
  FFW_EXTRACTION_MODEL: gemini-flash-latest
  FFW_MAX_LIVE_BATCH: "20"
  PYTHONUNBUFFERED: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FFW_REPORT_PATH: /tmp/ffw-run-report.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFW and media tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run network-free tests
        env:
          FFW_MODE: mock
        run: python -m unittest discover -s tests -v

      - name: Verify AI provider credentials
        if: ${{ github.event_name != 'push' && inputs.mode != 'deploy_only' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          echo "Provider: $FFW_AI_PROVIDER"
          echo "Transcription model: $FFW_TRANSCRIPTION_MODEL"
          echo "Extraction model: $FFW_EXTRACTION_MODEL"
          if [[ "$FFW_AI_PROVIDER" == "gemini" && -z "$GEMINI_API_KEY" ]]; then
            echo "::error::GEMINI_API_KEY repository secret is missing or empty."
            exit 2
          fi
          if [[ "$FFW_AI_PROVIDER" == "openai" && -z "$OPENAI_API_KEY" ]]; then
            echo "::error::OPENAI_API_KEY repository secret is missing or empty."
            exit 2
          fi

      - name: Process live feed
        if: ${{ github.event_name != 'push' }}
        id: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_MODE: ${{ inputs.mode || 'next' }}
          INPUT_LIMIT: ${{ inputs.batch_size || '1' }}
          INPUT_GUID: ${{ inputs.force_guid || '' }}
        shell: bash
        run: |
          if [[ "$INPUT_MODE" == "deploy_only" ]]; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "Deploy-only mode selected; skipping live feed processing."
            exit 0
          fi
          if [[ ! "$INPUT_LIMIT" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::batch_size must be a positive integer from 1 to $FFW_MAX_LIVE_BATCH."
            exit 2
          fi
          if (( INPUT_LIMIT > FFW_MAX_LIVE_BATCH )); then
            echo "::error::batch_size $INPUT_LIMIT exceeds the safety cap of $FFW_MAX_LIVE_BATCH."
            exit 2
          fi
          case "$INPUT_MODE" in
            next) args=(process-next --live) ;;
            backfill) args=(backfill --live --limit "$INPUT_LIMIT") ;;
            retry_failed) args=(retry-failed --live --limit "$INPUT_LIMIT") ;;
            *) echo "::error::Unsupported processing mode: $INPUT_MODE"; exit 2 ;;
          esac
          if [[ -n "$INPUT_GUID" ]]; then args=(run --live --force-guid "$INPUT_GUID"); fi
          args+=(--report-json "$FFW_REPORT_PATH")
          set +e
          python -m ffw "${args[@]}"
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "Pipeline completed with exit code $exit_code; validation and durable-state persistence will continue."

      - name: Build deploy-only production catalog
        if: ${{ github.event_name == 'push' || inputs.mode == 'deploy_only' }}
        run: python -m ffw render

      - name: Validate production archive
        run: python -m ffw validate

      - name: Persist durable state and archive
        if: ${{ github.event_name != 'push' && (github.event_name != 'workflow_dispatch' || inputs.mode != 'deploy_only') }}
        id: persist
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive state
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(ffw): publish automated episode updates"
            git push origin HEAD:${{ github.event.repository.default_branch }}
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build clean Pages artifact
        shell: bash
        run: |
          mkdir -p _site/archive
          cp web/index.html web/app.js web/styles.css web/summary.html web/summary.js _site/
          cp -R archive/. _site/archive/

      - name: Configure Pages
        if: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || inputs.deploy) && (steps.pipeline.outputs.exit_code == '0' || steps.pipeline.outputs.exit_code == '') }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || inputs.deploy) && (steps.pipeline.outputs.exit_code == '0' || steps.pipeline.outputs.exit_code == '') }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          echo "## FFW production run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ inputs.mode || 'next' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pipeline exit: ${{ steps.pipeline.outputs.exit_code || 'not-run' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Durable outputs changed: ${{ steps.persist.outputs.changed || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "$FFW_REPORT_PATH" ]]; then
            python - "$FFW_REPORT_PATH" "$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          import sys

          report = json.load(open(sys.argv[1], encoding="utf-8"))
          with open(sys.argv[2], "a", encoding="utf-8") as summary:
              summary.write(f"- Selector policy: {report['policy']}\n")
              summary.write(f"- Feed entries scanned: {report['feed_entries_scanned']}\n")
              summary.write(f"- Completed skipped: {report['completed_skipped']}\n")
              summary.write(f"- Failed skipped: {report['failed_skipped']}\n")
              summary.write(f"- Eligible found: {report['eligible_found']}\n")
              summary.write(f"- Selected: {report['selected_count']}\n")
              summary.write(f"- Attempted: {report['attempted']}\n")
              summary.write(f"- Complete: {report['completed']}\n")
              summary.write(f"- Needs review: {report['needs_review']}\n")
              summary.write(f"- Failed: {report['failed']}\n")
              if report["newest_selected"]:
                  summary.write(f"- Newest selected: {report['newest_selected']['title']}\n")
              if report["oldest_selected"]:
                  summary.write(f"- Oldest selected: {report['oldest_selected']['title']}\n")
          PY
          fi
          echo "- Temporary audio is excluded from Git and runner storage is disposable." >> "$GITHUB_STEP_SUMMARY"

      - name: Report pipeline failure
        if: ${{ steps.pipeline.outputs.exit_code != '' && steps.pipeline.outputs.exit_code != '0' }}
        shell: bash
        run: |
          echo "::error::FFW pipeline failed with exit code ${{ steps.pipeline.outputs.exit_code }}. Durable failure state was validated and persisted."
          exit "${{ steps.pipeline.outputs.exit_code }}"


  deploy:
    needs: publish
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || inputs.deploy }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish deployment summary
        if: always()
        shell: bash
        run: |
          echo "## FFW deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages deployment outcome: ${{ steps.deployment.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages URL: ${{ steps.deployment.outputs.page_url || 'not available' }}" >> "$GITHUB_STEP_SUMMARY"
